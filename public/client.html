<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Cleaning - Abra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"
        integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex items-center justify-center p-4 py-12">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl overflow-hidden shadow-indigo-100/50">

        <div class="bg-indigo-600 px-8 py-6 text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-indigo-500 rounded-full opacity-50 blur-2xl">
            </div>
            <i data-lucide="sparkles" class="w-8 h-8 mb-4 text-indigo-200"></i>
            <h1 class="text-2xl font-bold tracking-tight mb-1">Book your cleaning</h1>
            <p class="text-indigo-100 font-medium text-sm">Fill out the details below to request a service.</p>
        </div>

        <div class="p-8" id="form-container">
            <form hx-post="/.netlify/functions/submit-booking" hx-target="#form-container" hx-swap="outerHTML"
                class="space-y-5">

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe"
                        class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Street Address</label>
                        <input type="text" name="address" required placeholder="123 Main St"
                            class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Postcode</label>
                        <input type="text" name="postcode" required placeholder="BS1 4TQ"
                            class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Date</label>
                    <input type="date" id="booking_date" name="booking_date" required
                        class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border bg-white text-slate-700">
                    <p class="text-xs text-slate-500 mt-1" id="date-helper-text">Monday to Friday appointments only.</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Preferred Time Slot</label>
                    <select name="time_slot" required
                        class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border bg-white">
                        <!-- Generate 1-hour slots every half hour from 08:00 to 17:00 -->
                        <option value="">Select a time...</option>
                        <option value="08:00 - 09:00">08:00 - 09:00</option>
                        <option value="08:30 - 09:30">08:30 - 09:30</option>
                        <option value="09:00 - 10:00">09:00 - 10:00</option>
                        <option value="09:30 - 10:30">09:30 - 10:30</option>
                        <option value="10:00 - 11:00">10:00 - 11:00</option>
                        <option value="10:30 - 11:30">10:30 - 11:30</option>
                        <option value="11:00 - 12:00">11:00 - 12:00</option>
                        <option value="11:30 - 12:30">11:30 - 12:30</option>
                        <option value="12:00 - 13:00">12:00 - 13:00</option>
                        <option value="12:30 - 13:30">12:30 - 13:30</option>
                        <option value="13:00 - 14:00">13:00 - 14:00</option>
                        <option value="13:30 - 14:30">13:30 - 14:30</option>
                        <option value="14:00 - 15:00">14:00 - 15:00</option>
                        <option value="14:30 - 15:30">14:30 - 15:30</option>
                        <option value="15:00 - 16:00">15:00 - 16:00</option>
                        <option value="15:30 - 16:30">15:30 - 16:30</option>
                        <option value="16:00 - 17:00">16:00 - 17:00</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Extra Notes for Cleaners</label>
                    <textarea name="notes" rows="3" placeholder="Gate code is 1234, please watch out for the dog..."
                        class="w-full text-sm border-slate-300 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 py-3 px-4 border resize-none"></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors htmx-request-btn">
                        <span>Submit Booking Request</span>
                    </button>
                    <p class="text-xs text-center text-slate-400 mt-4 font-medium flex items-center justify-center">
                        <i data-lucide="lock" class="w-3 h-3 mr-1"></i> Securley processed by Abra
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.body.addEventListener('htmx:afterSwap', function (evt) {
            lucide.createIcons();
        });

        // Initialize date picker settings
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('booking_date');
            if (dateInput) {
                // Set minimum date to tomorrow
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateInput.setAttribute('min', tomorrow.toISOString().split('T')[0]);

                // Enforce Mon-Fri
                dateInput.addEventListener('input', function (e) {
                    const day = new Date(this.value).getUTCDay();
                    if ([6, 0].includes(day)) {
                        e.preventDefault();
                        this.value = '';
                        document.getElementById('date-helper-text').className = 'text-xs text-red-500 mt-1 font-bold';
                        document.getElementById('date-helper-text').innerText = 'Weekends are unsupported. Please select a weekday.';
                    } else {
                        document.getElementById('date-helper-text').className = 'text-xs text-slate-500 mt-1';
                        document.getElementById('date-helper-text').innerText = 'Monday to Friday appointments only.';
                    }
                });
            }
        });
    </script>
</body>

</html>
