<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra - Information Logistics System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Subtle Background Pattern */
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .portal-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.1), 0 10px 10px -5px rgba(79, 70, 229, 0.04);
        }

        .icon-bounce {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .portal-card:hover .icon-bounce {
            transform: scale(1.15) rotate(5deg);
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex flex-col relative overflow-hidden bg-slate-50">

    <!-- Decorative Top Blobs -->
    <div class="absolute top-0 left-0 w-full h-[500px] overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-indigo-200/50 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute top-20 -left-20 w-72 h-72 bg-blue-200/50 rounded-full blur-3xl opacity-60"></div>
    </div>

    <!-- Header -->
    <header class="w-full px-6 py-8 flex justify-center items-center">
        <div class="flex items-center gap-3">
            <div
                class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-600/30">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 leading-none">Abra</h1>
                <p class="text-sm text-indigo-600 font-semibold tracking-wide uppercase mt-1">Information Logistics</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-6xl mx-auto z-10">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl px-4">

            <!-- Manager Portal -->
            <div onclick="openPasscode('manager')"
                class="portal-card group relative bg-white rounded-3xl p-8 border border-slate-200 cursor-pointer overflow-hidden z-10 block">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-slate-50 to-white opacity-0 group-hover:opacity-100 transition-opacity -z-10">
                </div>
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-gradient-to-bl from-indigo-100 to-transparent rounded-bl-full -z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                </div>

                <div
                    class="w-16 h-16 bg-slate-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i data-lucide="layout-dashboard" class="w-8 h-8 icon-bounce"></i>
                </div>

                <h3 class="text-2xl font-bold text-slate-900 mb-6">Manager Portal</h3>

                <div class="flex items-center text-indigo-600 font-bold text-sm">
                    Enter Dashboard <i data-lucide="arrow-right"
                        class="w-4 h-4 ml-1 transition-transform group-hover:translate-x-1"></i>
                </div>
            </div>

            <!-- Worker Portal -->
            <div onclick="openPasscode('worker')"
                class="portal-card group relative bg-white rounded-3xl p-8 border border-slate-200 cursor-pointer overflow-hidden z-10 block">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-slate-50 to-white opacity-0 group-hover:opacity-100 transition-opacity -z-10">
                </div>
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-gradient-to-bl from-emerald-100 to-transparent rounded-bl-full -z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                </div>

                <div
                    class="w-16 h-16 bg-slate-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                    <i data-lucide="map" class="w-8 h-8 icon-bounce"></i>
                </div>

                <h3 class="text-2xl font-bold text-slate-900 mb-6">Worker Portal</h3>

                <div class="flex items-center text-emerald-600 font-bold text-sm">
                    View My Shifts <i data-lucide="arrow-right"
                        class="w-4 h-4 ml-1 transition-transform group-hover:translate-x-1"></i>
                </div>
            </div>

            <!-- Client Portal -->
            <a href="/client.html"
                class="portal-card group relative bg-white rounded-3xl p-8 border border-slate-200 cursor-pointer overflow-hidden z-10 block">
                <div
                    class="absolute inset-0 bg-gradient-to-br from-slate-50 to-white opacity-0 group-hover:opacity-100 transition-opacity -z-10">
                </div>
                <div
                    class="absolute right-0 top-0 w-24 h-24 bg-gradient-to-bl from-rose-100 to-transparent rounded-bl-full -z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                </div>

                <div
                    class="w-16 h-16 bg-slate-100 text-rose-500 rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:bg-rose-500 group-hover:text-white transition-colors">
                    <i data-lucide="calendar-heart" class="w-8 h-8 icon-bounce"></i>
                </div>

                <h3 class="text-2xl font-bold text-slate-900 mb-6">Client Booking</h3>

                <div class="flex items-center text-rose-500 font-bold text-sm">
                    Book Service <i data-lucide="arrow-right"
                        class="w-4 h-4 ml-1 transition-transform group-hover:translate-x-1"></i>
                </div>
            </a>

        </div>
    </main>

    <!-- Passcode Modal -->
    <div id="passcode-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closePasscode()"></div>
        <div
            class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 text-center">
                <div id="modal-icon-container"
                    class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <i id="modal-icon" data-lucide="lock" class="w-8 h-8"></i>
                </div>
                <h4 id="modal-title" class="text-2xl font-bold text-slate-900 mb-2">Enter Passcode</h4>
                <p class="text-slate-500 mb-8 font-medium">Please enter your 4-digit PIN access the portal.</p>

                <div class="flex justify-center gap-3 mb-8">
                    <input type="password" maxlength="1"
                        class="pin-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-600 focus:ring-0 transition-colors outline-none"
                        autofocus>
                    <input type="password" maxlength="1"
                        class="pin-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-600 focus:ring-0 transition-colors outline-none">
                    <input type="password" maxlength="1"
                        class="pin-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-600 focus:ring-0 transition-colors outline-none">
                    <input type="password" maxlength="1"
                        class="pin-input w-12 h-14 text-center text-2xl font-bold border-2 border-slate-200 rounded-xl focus:border-indigo-600 focus:ring-0 transition-colors outline-none">
                </div>

                <div id="error-msg" class="text-rose-500 text-sm font-bold mb-6 hidden">Incorrect passcode. Try again.
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full text-center py-8 text-slate-400 text-sm font-medium">
        &copy; 2026 Abra Logistics. All rights reserved.
    </footer>

    <script>
        lucide.createIcons();

        let currentPortal = '';
        const pins = {
            manager: '3333',
            worker: '1111'
        };

        function openPasscode(portal) {
            currentPortal = portal;
            const modal = document.getElementById('passcode-modal');
            const icon = document.getElementById('modal-icon');
            const container = document.getElementById('modal-icon-container');
            const title = document.getElementById('modal-title');
            const error = document.getElementById('error-msg');

            // Reset inputs
            document.querySelectorAll('.pin-input').forEach(input => input.value = '');
            error.classList.add('hidden');

            if (portal === 'manager') {
                container.className = 'w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6';
                icon.setAttribute('data-lucide', 'layout-dashboard');
                title.innerText = 'Manager Access';
            } else {
                container.className = 'w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6';
                icon.setAttribute('data-lucide', 'map');
                title.innerText = 'Worker Access';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
            document.querySelector('.pin-input').focus();
        }

        function closePasscode() {
            const modal = document.getElementById('passcode-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Handle PIN input focus and completion
        const inputs = document.querySelectorAll('.pin-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

                // Check PIN when last digit is entered
                if (Array.from(inputs).every(i => i.value.length === 1)) {
                    const pin = Array.from(inputs).map(i => i.value).join('');
                    if (pin === pins[currentPortal]) {
                        window.location.href = `/${currentPortal}.html`;
                    } else {
                        document.getElementById('error-msg').classList.remove('hidden');
                        inputs.forEach(i => i.value = '');
                        inputs[0].focus();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>

</html>
