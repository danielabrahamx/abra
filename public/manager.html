<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra Manager Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for rapid prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Sortable.js -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        
        /* Sortable styles */
        .sortable-ghost { opacity: 0.4; }
        .sortable-drag { cursor: grabbing !important; }
        .worker-pill { touch-action: none; }
        
        /* Hide scrollbar for grid but keep functionality */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center z-10 sticky top-0">
        <div class="flex items-center gap-3 mb-4 sm:mb-0">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-sm">
                <i data-lucide="sparkles"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Abra</h1>
                <p class="text-xs text-slate-500 font-medium tracking-wide uppercase">Information Logistics</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
           <!-- Form to quick-add job -->
           <form class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200" hx-post="/.netlify/functions/update-schedule" hx-swap="none">
               <input type="hidden" name="action" value="add-job">
               
               <select name="client" class="text-sm border-slate-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" hx-get="/.netlify/functions/get-clients" hx-trigger="load" hx-swap="innerHTML" required>
                   <option>Loading clients...</option>
               </select>

               <input type="text" name="postcode" placeholder="Postcode" class="w-24 text-sm border-slate-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required>
               <input type="text" name="time_interval" placeholder="Time (e.g., 09:00 - 11:00)" class="w-40 text-sm border-slate-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required>
               
               <select name="date" id="quick-add-date" class="text-sm border-slate-300 rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500" required>
                   <!-- Populated by JS -->
               </select>

               <button type="submit" class="bg-indigo-600 text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-700 transition-colors flex items-center shadow-sm">
                   <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Add Job
               </button>
           </form>

            <button onclick="document.getElementById('clientModal').classList.remove('hidden')" class="bg-white border border-slate-300 text-slate-700 px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-50 flex items-center transition-colors shadow-sm">
                <i data-lucide="users" class="w-4 h-4 mr-1"></i> Clients
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden bg-slate-50/50">
        
        <!-- Workers Panel (Sidebar) -->
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col h-48 md:h-full shrink-0 relative z-10 shadow-[4px_0_24px_-12px_rgba(0,0,0,0.1)]">
            <div class="px-5 py-4 border-b border-slate-100 bg-white sticky top-0">
                <h2 class="text-sm font-bold text-slate-800 flex items-center uppercase tracking-wider">
                    <i data-lucide="users" class="w-4 h-4 mr-2 text-indigo-500"></i> Team Roster
                </h2>
                <p class="text-xs text-slate-500 mt-1">Drag workers onto job cards</p>
            </div>
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" id="roster-list">
                <!-- Worker Pills injected by JS here -->
                 <div id="roster-pool" class="space-y-2 min-h-full"></div>
            </div>
        </aside>

        <!-- Schedule Grid (Horizontal Scrollable) -->
        <div class="flex-1 overflow-x-auto overflow-y-hidden hide-scrollbar">
            <div class="flex h-full p-6 gap-6 min-w-max" id="schedule-grid">
                <!-- Columns injected by JS -->
            </div>
        </div>
    </main>

    <!-- Generic hidden notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl translate-y-[150%] transition-transform duration-300 z-50 flex items-center">
        <i data-lucide="info" class="w-5 h-5 mr-3 text-blue-400"></i>
        <span id="toast-message" class="text-sm font-medium">Notification</span>
    </div>

    <!-- Add Client Modal -->
    <div id="clientModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="px-6 py-4 flex justify-between items-center border-b border-slate-100 bg-slate-50/50">
                <h3 class="text-lg font-bold text-slate-800 flex items-center">
                    <i data-lucide="user-plus" class="w-5 h-5 mr-2 text-indigo-500"></i> Add New Client
                </h3>
                <button onclick="document.getElementById('clientModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form hx-post="/.netlify/functions/add-client" hx-target="select[name='client']" class="p-6 space-y-4" onsubmit="setTimeout(() => document.getElementById('clientModal').classList.add('hidden'), 100)">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" name="client_name" required class="w-full text-sm border-slate-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 py-2.5 px-3 border">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Street Name</label>
                        <input type="text" name="street" required class="w-full text-sm border-slate-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 py-2.5 px-3 border">
                    </div>
                    <div class="w-1/3">
                        <label class="block text-sm font-medium text-slate-700 mb-1">House No.</label>
                        <input type="text" name="house_number" required class="w-full text-sm border-slate-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 py-2.5 px-3 border">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Notes (Optional)</label>
                    <textarea name="notes" rows="2" class="w-full text-sm border-slate-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 py-2.5 px-3 border resize-none"></textarea>
                </div>
                <div class="mt-6">
                    <button type="submit" class="w-full bg-indigo-600 text-white px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-indigo-700 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Save Client
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/manager.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
